<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0015"/>
      <stop offset="0.5" stop-color="#1a0533"/>
      <stop offset="1" stop-color="#0a0015"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff6b9d"/>
      <stop offset="0.5" stop-color="#c44dff"/>
      <stop offset="1" stop-color="#ffd93d"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff6b9d" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ff6b9d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#c44dff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#c44dff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cakeTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff9a9e"/><stop offset="1" stop-color="#fecfef"/>
    </linearGradient>
    <linearGradient id="cakeMid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a18cd1"/><stop offset="1" stop-color="#fbc2eb"/>
    </linearGradient>
    <linearGradient id="cakeBot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffecd2"/><stop offset="1" stop-color="#fcb69f"/>
    </linearGradient>
    <radialGradient id="flame" cx="0.5" cy="0.7" r="0.6">
      <stop offset="0" stop-color="#ffd93d"/><stop offset="0.6" stop-color="#ff6b35"/><stop offset="1" stop-color="#ff6b35" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="180" cy="120" r="280" fill="url(#glow1)"/>
  <circle cx="1020" cy="520" r="300" fill="url(#glow2)"/>

  <!-- Cake -->
  <g transform="translate(600,90)">
    <!-- flame -->
    <ellipse cx="0" cy="-6" rx="11" ry="20" fill="url(#flame)"/>
    <!-- candle -->
    <rect x="-5" y="10" width="10" height="42" rx="4" fill="#fff3b0"/>
    <!-- layers -->
    <rect x="-70" y="52" width="140" height="42" rx="12" fill="url(#cakeTop)"/>
    <rect x="-90" y="92" width="180" height="46" rx="10" fill="url(#cakeMid)"/>
    <rect x="-110" y="136" width="220" height="52" rx="14" fill="url(#cakeBot)"/>
    <!-- sprinkles -->
    <circle cx="-40" cy="72" r="4" fill="#c44dff"/>
    <circle cx="10" cy="70" r="4" fill="#4dc9ff"/>
    <circle cx="45" cy="74" r="4" fill="#ffd93d"/>
    <circle cx="-15" cy="112" r="4" fill="#ff6b9d"/>
    <circle cx="55" cy="114" r="4" fill="#4dffb8"/>
    <circle cx="-60" cy="110" r="4" fill="#ffd93d"/>
  </g>

  <!-- Text -->
  <text x="600" y="380" font-family="Georgia, serif" font-size="76" font-weight="bold" font-style="italic" text-anchor="middle" fill="url(#title)">Nireshnee's Birthday</text>
  <text x="600" y="448" font-family="Arial, sans-serif" font-size="40" text-anchor="middle" fill="#ffffff">A special countdown is on the way</text>
  <text x="600" y="524" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#ffd93d">July 23, 2026</text>

  <!-- decorative hearts -->
  <g fill="#ff6b9d">
    <path d="M330 560 c-8-9 -26-4 -26 12 c0 14 26 28 26 28 c0 0 26-14 26-28 c0-16 -18-21 -26-12 z" opacity="0.9"/>
  </g>
  <g fill="#c44dff">
    <path d="M600 566 c-7-8 -23-3.5 -23 10.5 c0 12.5 23 24.5 23 24.5 c0 0 23-12 23-24.5 c0-14 -16-18.5 -23-10.5 z" opacity="0.9"/>
  </g>
  <g fill="#ffd93d">
    <path d="M870 560 c-8-9 -26-4 -26 12 c0 14 26 28 26 28 c0 0 26-14 26-28 c0-16 -18-21 -26-12 z" opacity="0.9"/>
  </g>
</svg>
